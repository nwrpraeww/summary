<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HumanSoft – Document Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
:root {
  --blue:    #1A56DB;
  --blue-dk: #1240B0;
  --blue-lt: #EEF2FF;
  --blue-md: #BFDBFE;
  --orange:  #F47B20;
  --border:  #D1D5DB;
  --nav-h:   56px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Anuphan', sans-serif;
  background: #E8EDF8;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Master Nav ───────────────────────────────────────── */
.master-nav {
  height: var(--nav-h);
  background: white;
  border-bottom: 1px solid var(--border);
  box-shadow: 0 2px 8px rgba(0,0,0,.12);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
  z-index: 999;
}

/* ── Info strip (project fields) ─────────────────────────── */
.info-strip {
  background: #F0F4FF;
  border-bottom: 1px solid var(--blue-md);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 6px;
  flex-shrink: 0;
  height: 42px;
  overflow-x: auto;
}
.info-lbl {
  font-size: 11px; font-weight: 700; color: var(--blue-dk);
  white-space: nowrap; flex-shrink: 0;
}
.info-input {
  height: 28px; padding: 0 9px;
  border: 1.5px solid var(--blue-md); border-radius: 6px;
  font-family: 'Anuphan', sans-serif; font-size: 12px; font-weight: 500;
  color: #1E293B; background: white; outline: none;
  transition: border-color .15s, box-shadow .15s;
  flex-shrink: 0;
}
.info-input:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(26,86,219,.12); }
.info-input::placeholder { color: #94A3B8; }
.info-input.w-domain  { width: 160px; }
.info-input.w-company { width: 160px; }
.info-input.w-date    { width: 140px; }
.info-select {
  height: 28px; padding: 0 8px;
  border: 1.5px solid var(--blue-md); border-radius: 6px;
  font-family: 'Anuphan', sans-serif; font-size: 12px; font-weight: 500;
  color: #1E293B; background: white; outline: none; cursor: pointer;
  width: 148px; transition: border-color .15s;
  flex-shrink: 0;
}
.info-select:focus { border-color: var(--blue); }
.info-sep { width: 1px; height: 18px; background: var(--blue-md); flex-shrink: 0; margin: 0 4px; }

.nav-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }

.nav-brand {
  font-size: 16px; font-weight: 800; color: var(--blue); white-space: nowrap;
}
.nav-brand b { color: var(--orange); }

/* page dots / tabs */
.nav-tabs {
  display: flex; gap: 4px; align-items: center;
}
.nav-tab {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 14px; border-radius: 20px;
  font-size: 11.5px; font-weight: 600;
  cursor: pointer; border: 1.5px solid transparent;
  transition: all .15s; white-space: nowrap;
  color: #6B7280; background: #F9FAFB; border-color: var(--border);
}
.nav-tab:hover { border-color: var(--blue-md); color: var(--blue); background: var(--blue-lt); }
.nav-tab.active {
  background: var(--blue); color: white; border-color: var(--blue);
  box-shadow: 0 2px 8px rgba(26,86,219,.3);
}
.tab-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: currentColor; opacity: .7; flex-shrink: 0;
}

/* nav right side */
.nav-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 8px;
}

.nav-page-info {
  font-size: 11px; color: #9CA3AF; font-weight: 600;
  background: #F3F4F6; border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 10px; white-space: nowrap;
}
.nav-page-info span { color: var(--blue); font-weight: 800; }

.btn-nav {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 16px; border-radius: 8px;
  font-family: 'Anuphan', sans-serif; font-size: 12px; font-weight: 700;
  cursor: pointer; border: 1.5px solid transparent;
  transition: all .15s; white-space: nowrap;
}
.btn-nav:disabled { opacity: .35; cursor: not-allowed; }
.btn-prev {
  background: var(--blue-lt); color: var(--blue-dk); border-color: var(--blue-md);
}
.btn-prev:not(:disabled):hover { background: var(--blue-md); }
.btn-next {
  background: var(--blue); color: white; border-color: var(--blue);
  box-shadow: 0 2px 6px rgba(26,86,219,.3);
}
.btn-next:not(:disabled):hover { background: var(--blue-dk); }

.btn-save-all {
  background: #D1FAE5; color: #065F46;
  border: 1.5px solid #A7F3D0;
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 16px; border-radius: 8px;
  font-family: 'Anuphan', sans-serif; font-size: 12px; font-weight: 700;
  cursor: pointer; white-space: nowrap; transition: all .15s;
}
.btn-save-all:hover { background: #A7F3D0; box-shadow: 0 2px 6px rgba(5,150,105,.25); }
.btn-save-all.loading { opacity: .6; cursor: wait; }

.btn-action {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 14px; border-radius: 8px;
  font-family: 'Anuphan', sans-serif; font-size: 12px; font-weight: 700;
  cursor: pointer; border: 1.5px solid transparent;
  transition: all .15s; white-space: nowrap;
}
.btn-action:disabled { opacity: .35; cursor: not-allowed; }
.btn-act-preview { background: #EFF6FF; color: #1D4ED8; border-color: #BFDBFE; }
.btn-act-preview:hover:not(:disabled) { background: #DBEAFE; }
.btn-act-import  { background: #F3F4F6; color: #374151; border-color: #D1D5DB; }
.btn-act-import:hover:not(:disabled)  { background: #E5E7EB; }
.btn-act-drive   { background: #D1FAE5; color: #065F46; border-color: #A7F3D0; }
.btn-act-drive:not(.loading):hover    { background: #A7F3D0; box-shadow: 0 2px 6px rgba(5,150,105,.25); }
.btn-act-drive.loading { opacity: .6; cursor: wait; }

/* toast */
.c-toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  background: #1A1F2E; color: white;
  padding: 11px 20px; border-radius: 10px;
  font-size: 13px; font-weight: 600;
  box-shadow: 0 4px 16px rgba(0,0,0,.3);
  transform: translateY(80px); opacity: 0;
  transition: all .3s ease; pointer-events: none;
  max-width: 360px; white-space: pre-line;
}
.c-toast.show { transform: translateY(0); opacity: 1; }

/* ── Page indicator strip ─────────────────────────────── */
.page-strip {
  height: 3px;
  background: var(--blue-lt);
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.page-strip-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue) 0%, var(--orange) 100%);
  transition: width .35s cubic-bezier(.4,0,.2,1);
}

/* ── Iframe wrapper ──────────────────────────────────── */
.frame-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.doc-frame {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border: none;
  display: none;
  background: #E8EDF8;
  opacity: 0;
  transition: opacity .2s ease;
}
.doc-frame.active {
  display: block;
  opacity: 1;
}

/* ── Page slide animation ────────────────────────────── */
@keyframes slideInRight {
  from { transform: translateX(40px); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}
@keyframes slideInLeft {
  from { transform: translateX(-40px); opacity: 0; }
  to   { transform: translateX(0);     opacity: 1; }
}
.slide-in-right { animation: slideInRight .25s ease forwards; }
.slide-in-left  { animation: slideInLeft  .25s ease forwards; }
</style>
</head>
<body>

<!-- ── Master Navigation ──────────────────────────────────── -->
<nav class="master-nav">
  <!-- Brand -->
  <div class="nav-brand">Human<b>Soft</b></div>

  <div class="nav-sep"></div>

  <!-- Page tabs -->

    <button class="nav-tab active" id="tab-1" onclick="goPage(1)">

<!-- ── Project Info Strip ──────────────────────────────────── -->
<div class="info-strip">
  <span class="info-lbl">🌐 Domain:</span>
  <input class="info-input w-domain" id="sharedDomain" placeholder="เช่น thaisugarmill" oninput="pushSharedData()" />

</div>

<!-- Progress strip -->
<div class="page-strip">

<!-- ── Iframe Frames ──────────────────────────────────────── -->
<div class="frame-wrap">
  <iframe class="doc-frame active" id="frame-1" src="customer-report.html?embedded=1" title="Customer Requirement Report"></iframe>
  <iframe class="doc-frame"        id="frame-2" src="requirement-tracker.html?embedded=1" title="Requirement Tracker"></iframe>
  <iframe class="doc-frame"        id="frame-3" src="timeline_template.html?embedded=1"   title="Implementation Timeline"></iframe>
  <iframe class="doc-frame"        id="frame-4" src="humansoft-เปรียบเทียบแพ็กเกจ.html?embedded=1" title="เปรียบเทียบแพ็กเกจ"></iframe>
</div>

<script>
let currentPage = 1;
const TOTAL = 4;

/* ── Shared domain/team sync to all iframes ────────────────── */
function pushSharedData() {
  const domain  = document.getElementById('sharedDomain').value.trim();
  const company = document.getElementById('sharedCompany').value.trim();
  const date    = document.getElementById('sharedDate').value;
  const team    = document.getElementById('sharedTeam').value;
  ['frame-1','frame-2','frame-3','frame-4'].forEach(fid => {
    try {
      const win = document.getElementById(fid).contentWindow;
      if (typeof win.setSharedData === 'function') win.setSharedData(domain, company, date, team);
    } catch(e) {}
  });
  cbMetaSave();
}

/* ── Persist meta bar (localStorage) — กันข้อมูลโครงการหายเมื่อรีโหลด ── */
const CB_META_KEY = 'hs_combined_meta_v1';
function cbMetaSave() {
  try {
    localStorage.setItem(CB_META_KEY, JSON.stringify({
      domain:  document.getElementById('sharedDomain').value,
      company: document.getElementById('sharedCompany').value,
      date:    document.getElementById('sharedDate').value,
      team:    document.getElementById('sharedTeam').value
    }));
  } catch(e){}
}
function cbMetaRestore() {
  let raw; try { raw = localStorage.getItem(CB_META_KEY); } catch(e){ return; }
  if (!raw) return;
  let s; try { s = JSON.parse(raw); } catch(e){ return; }
  if (!s) return;
  const set = (id,v) => { const el = document.getElementById(id); if (el && v != null && v !== '') el.value = v; };
  set('sharedDomain', s.domain); set('sharedCompany', s.company);
  set('sharedDate', s.date);     set('sharedTeam', s.team);
}

// Set today's date as default
document.getElementById('sharedDate').value = new Date().toISOString().split('T')[0];
// Restore saved meta (overrides default date if present)
cbMetaRestore();

// Push shared data each time an iframe loads
['frame-1','frame-2','frame-3','frame-4'].forEach(fid => {
  document.getElementById(fid).addEventListener('load', () => {
    setTimeout(pushSharedData, 100);
  });
});
const ANIM_PREV = 'slide-in-left';
const ANIM_NEXT = 'slide-in-right';

function goPage(n, direction) {
  if (n < 1 || n > TOTAL || n === currentPage) return;

  const dir = direction || (n > currentPage ? 'next' : 'prev');
  const animClass = dir === 'next' ? ANIM_NEXT : ANIM_PREV;

  // Hide current
  const oldFrame = document.getElementById('frame-' + currentPage);
  oldFrame.classList.remove('active');

  // Show new
  currentPage = n;
  const newFrame = document.getElementById('frame-' + currentPage);
  newFrame.classList.remove(ANIM_NEXT, ANIM_PREV);
  newFrame.classList.add('active', animClass);

  // Remove animation class after it completes
  newFrame.addEventListener('animationend', () => {
    newFrame.classList.remove(ANIM_NEXT, ANIM_PREV);
  }, { once: true });

  updateNav();
}

function updateNav() {
  // Update tabs
  for (let i = 1; i <= TOTAL; i++) {
    document.getElementById('tab-' + i).classList.toggle('active', i === currentPage);
  }

  // Update page number
  document.getElementById('pageNum').textContent = currentPage;

  // Update prev/next buttons
  document.getElementById('btnPrev').disabled = currentPage === 1;
  document.getElementById('btnNext').disabled = currentPage === TOTAL;

  // Update progress bar
  const pct = (currentPage / TOTAL) * 100;
  document.getElementById('progressFill').style.width = pct + '%';

  // Context-aware: preview & import only for page 1 and 3 (data pages);
  // Drive save on the Timeline page (page 3, end of the data-entry flow).
  // Page 4 (เปรียบเทียบแพ็กเกจ) is a reference view — no action buttons.
  const hasCtx = currentPage === 1 || currentPage === 3;
  document.getElementById('btnPreview').style.display = hasCtx ? '' : 'none';
  document.getElementById('btnImport').style.display  = hasCtx ? '' : 'none';
  document.getElementById('btnDrive').style.display   = currentPage === 3 ? '' : 'none';
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goPage(currentPage + 1, 'next');
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goPage(currentPage - 1, 'prev');
});

/* ── Toast helper ──────────────────────────────────────────── */
let _cToastTimer;
function cToast(msg) {
  const el = document.getElementById('cToast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_cToastTimer);
  _cToastTimer = setTimeout(() => el.classList.remove('show'), 4500);
}

/* ── Style helpers ─────────────────────────────────────────── */
function hdrStyle(rgb) {
  return {
    fill: { patternType:'solid', fgColor:{ rgb } },
    font: { bold:true, color:{ rgb:'FFFFFF' }, name:'Anuphan', sz:11 },
    alignment: { horizontal:'center', vertical:'center', wrapText:true },
    border: {
      top:   { style:'thin', color:{ rgb:'000000' } },
      bottom:{ style:'thin', color:{ rgb:'000000' } },
      left:  { style:'thin', color:{ rgb:'000000' } },
      right: { style:'thin', color:{ rgb:'000000' } }
    }
  };
}
function cellStyle(fill) {
  return {
    fill: { patternType:'solid', fgColor:{ rgb: fill } },
    font: { name:'Anuphan', sz:11 },
    alignment: { vertical:'top', wrapText:true },
    border: {
      top:   { style:'thin', color:{ rgb:'D1D5DB' } },
      bottom:{ style:'thin', color:{ rgb:'D1D5DB' } },
      left:  { style:'thin', color:{ rgb:'D1D5DB' } },
      right: { style:'thin', color:{ rgb:'D1D5DB' } }
    }
  };
}
function sectionStyle() {
  return {
    fill: { patternType:'solid', fgColor:{ rgb:'EEF2FF' } },
    font: { bold:true, color:{ rgb:'1240B0' }, name:'Anuphan', sz:11 },
    alignment: { vertical:'center', wrapText:true }
  };
}

function applySheetStyles(ws, headerRgb) {
  if (!ws['!ref']) return;
  const range = XLSX.utils.decode_range(ws['!ref']);
  let isFirstDataRow = true;

  for (let R = range.s.r; R <= range.e.r; R++) {
    const firstCell = ws[XLSX.utils.encode_cell({r:R, c:0})];
    const rowText = firstCell?.v?.toString() || '';

    // Section/title rows (emoji prefix or ──)
    const isSection = rowText.startsWith('📌') || rowText.startsWith('🎯') ||
                      rowText.startsWith('🎁') || rowText.startsWith('──') ||
                      rowText.startsWith('หมายเหตุ');

    // First data row after a title row = header row
    const isHeader = !isSection && isFirstDataRow && rowText !== '';
    if (rowText !== '') isFirstDataRow = false;
    if (isSection) isFirstDataRow = true;

    for (let C = range.s.c; C <= range.e.c; C++) {
      const addr = XLSX.utils.encode_cell({r:R, c:C});
      if (!ws[addr]) ws[addr] = { t:'s', v:'' };

      if (isSection) {
        ws[addr].s = sectionStyle();
      } else if (isHeader) {
        ws[addr].s = hdrStyle(headerRgb);
      } else {
        ws[addr].s = cellStyle(R % 2 === 0 ? 'FFFFFF' : 'F8FAFF');
      }
    }
  }
}

/* ── Value-based cell color coding (priority / status / responsible / checkmark) ── */
function valueStyle(fill, txtRgb, bold, center) {
    return {
        fill: { patternType:'solid', fgColor:{ rgb: fill } },
        font: { bold: bold, color:{ rgb: txtRgb }, name:'Anuphan', sz:11 },
        alignment: { horizontal: center ? 'center' : 'left', vertical:'top', wrapText:true },
        border: {
            top:   { style:'thin', color:{ rgb:'D1D5DB' } },
            bottom:{ style:'thin', color:{ rgb:'D1D5DB' } },
            left:  { style:'thin', color:{ rgb:'D1D5DB' } },
            right: { style:'thin', color:{ rgb:'D1D5DB' } }
        }
    };
}

// แมปค่าใน cell → สีพื้นหลัง/สีตัวอักษร
const CELL_VALUE_MAP = {
  // ── Priority ──────────────────────────────────────────
  'must':        { fill:'FEE2E2', txt:'991B1B', bold:true,  center:true },
  'should':      { fill:'FEF9C3', txt:'854D0E', bold:true,  center:true },
  'nice':        { fill:'D1FAE5', txt:'065F46', bold:true,  center:true },
  // ── Status ────────────────────────────────────────────
  'not started': { fill:'FEF9C3', txt:'92400E', bold:false, center:true },
  'pending':     { fill:'FFF4ED', txt:'C85E0F', bold:false, center:true },
  'in progress': { fill:'EEF2FF', txt:'1240B0', bold:true,  center:true },
  'done':        { fill:'D1FAE5', txt:'065F46', bold:true,  center:true },
  'completed':   { fill:'D1FAE5', txt:'065F46', bold:true,  center:true },
  'on hold':     { fill:'F3F4F6', txt:'6B7280', bold:false, center:true },
  'hold':        { fill:'F3F4F6', txt:'6B7280', bold:false, center:true },
  'cancelled':   { fill:'FEE2E2', txt:'991B1B', bold:false, center:true },
  // ── Requirement Tracker — Type ─────────────────────────
  'requirement': { fill:'1A56DB', txt:'FFFFFF', bold:true, center:true },
  'fasttrack':   { fill:'78350F', txt:'FFFFFF', bold:true, center:true },
  'customize':   { fill:'7C3AED', txt:'FFFFFF', bold:true, center:true },
  'extra code':  { fill:'16A34A', txt:'FFFFFF', bold:true, center:true },
  // ── Responsible ────────────────────────────────────────
  'humansoft':   { fill:'EEF2FF', txt:'1240B0', bold:false, center:true },
  'client':      { fill:'ECFDF5', txt:'065F46', bold:false, center:true },
  'hs + client': { fill:'FFF4ED', txt:'C85E0F', bold:false, center:true },
};

function applyValueStyles(ws, sheetIdx) {
  // sheetIdx: 0 = Customer Report, 1 = Requirement Tracker, 2 = Timeline
  if (!ws['!ref']) return;
  const range = XLSX.utils.decode_range(ws['!ref']);

  for (let R = range.s.r; R <= range.e.r; R++) {
    for (let C = range.s.c; C <= range.e.c; C++) {
      const addr = XLSX.utils.encode_cell({r:R, c:C});
      const cell = ws[addr];
      if (!cell || cell.v == null) continue;

      const raw = cell.v.toString().trim();
      const key = raw.toLowerCase();

      // checkmark '✓' — สีขึ้นอยู่กับ column
      if (raw === '✓') {
        // Customer Report: col 3 = ยังไม่รองรับ → สีส้ม, col 2 = รองรับ → สีเขียว
        if (sheetIdx === 0 && C === 3) {
          cell.s = valueStyle('FFF4ED', 'C85E0F', true, true);
        } else {
          cell.s = valueStyle('D1FAE5', '065F46', true, true);
        }
        continue;
      }

      const map = CELL_VALUE_MAP[key];
      if (map) {
        cell.s = valueStyle(map.fill, map.txt, map.bold, map.center);
      }
    }
  }
}

/* ── Build XLSX Blob (shared by Drive upload) ──────────────── */
async function buildXlsxBlob() {
  const f1 = document.getElementById('frame-1').contentWindow;
  const f2 = document.getElementById('frame-2').contentWindow;
  const f3 = document.getElementById('frame-3').contentWindow;

  // 1) Rich "Customer Report" workbook (Summary / Price / Features) — already fully styled
  let wb = null;
  try { if (typeof f1.makeReportWb === 'function') wb = f1.makeReportWb(); } catch(e) { console.error(e); }
  if (!wb || !wb.SheetNames || !wb.SheetNames.length) wb = XLSX.utils.book_new();

  // helper: append a sheet, replacing any existing one with the same name
  const appendSheet = (ws, name) => {
    if (wb.SheetNames.includes(name)) { delete wb.Sheets[name]; wb.SheetNames = wb.SheetNames.filter(n => n !== name); }
    XLSX.utils.book_append_sheet(wb, ws, name);
  };

  // 2) Requirement Tracker — always included, styled like the web UI (blue header)
  try {
    let r2 = null;
    try { r2 = (typeof f2.getSheetData === 'function') ? f2.getSheetData() : null; } catch(e) { console.error(e); }
    const RT_HEADER = ['No','CODE','Topic','Type','Price','Solution','Status','Remark'];
    const rtData = (r2 && r2.data && r2.data.length) ? r2.data : [RT_HEADER];
    const tw = XLSX.utils.aoa_to_sheet(rtData);
    tw['!cols'] = [{wch:8},{wch:16},{wch:24},{wch:16},{wch:12},{wch:50},{wch:14},{wch:30}];
    applySheetStyles(tw, '1A56DB');
    applyValueStyles(tw, 1);
    appendSheet(tw, 'Requirement Tracker');
  } catch(e) { console.error(e); }

  // 3) Timeline — rich Gantt sheet (matches design)
  try {
    const tlWs = (typeof f3.makeTimelineWs === 'function') ? f3.makeTimelineWs() : null;
    if (tlWs) {
        // applySheetStyles(tlWs, '1E40AF');
        // applyValueStyles(tlWs, 2);
        appendSheet(tlWs, 'Timeline');
    }
  } catch(e) { console.error(e); }
if (!wb.SheetNames.length) throw new Error('ไม่มีข้อมูลในเอกสาร');
  const arr = XLSX.write(wb, { bookType:'xlsx', type:'array' });
  return new Blob([arr], { type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
}

/* ── Preview / Import actions ──────────────────────────────── */
function doPreview() {
  try {
    if (currentPage === 1) document.getElementById('frame-1').contentWindow.previewPDF();
    else if (currentPage === 3) document.getElementById('frame-3').contentWindow.openPreview();
  } catch(e) { cToast('⚠️ ไม่สามารถเปิดพรีวิวได้: ' + e.message); }
}

function onMasterImport(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  try {
    const dt = new DataTransfer();
    dt.items.add(file);
    if (currentPage === 1) {
      const fi = document.getElementById('frame-1').contentDocument.getElementById('xlsxImportInput');
      fi.files = dt.files;
      fi.dispatchEvent(new Event('change'));
    } else if (currentPage === 3) {
      const fi = document.getElementById('frame-3').contentDocument.getElementById('import-input');
      fi.files = dt.files;
      fi.dispatchEvent(new Event('change'));
    }
  } catch(e) { cToast('❌ นำเข้าไม่สำเร็จ: ' + e.message); }
}

/* ── Google Drive upload ───────────────────────────────────── */
const TARGET_FOLDER_ID = '1Li1cTg9Pn_1TD0QIOZ5OJM3q6-vCGfrk';
let _cwTok = null;

async function _cwToken() {
  // Delegate OAuth to frame-1 (index.html has CLIENT_ID + token client set up)
  _cwTok = await document.getElementById('frame-1').contentWindow._getToken();
  return _cwTok;
}
async function _cwGet(url) {
  const tok = await _cwToken();
  const r = await fetch(url, { headers:{ Authorization:`Bearer ${tok}` } });
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}
async function _cwPost(url, opts) {
  const tok = _cwTok || await _cwToken();
  const r = await fetch(url, { ...opts, headers:{ Authorization:`Bearer ${tok}`, ...(opts.headers||{}) } });
  if (!r.ok) throw new Error(r.statusText);
  return r.json();
}
async function _cwFindOrMakeFolder(name) {
  const q = encodeURIComponent(`name='${name}' and mimeType='application/vnd.google-apps.folder' and '${TARGET_FOLDER_ID}' in parents and trashed=false`);
  const r = await _cwGet(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`);
  if (r.files?.length) return r.files[0].id;
  const c = await _cwPost('https://www.googleapis.com/drive/v3/files', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ name, mimeType:'application/vnd.google-apps.folder', parents:[TARGET_FOLDER_ID] }),
  });
  return c.id;
}
async function _cwNextName(base, ext, fid) {
  const q = encodeURIComponent(`'${fid}' in parents and trashed=false`);
  const r = await _cwGet(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(name)&pageSize=1000`);
  const ex = new Set((r.files||[]).map(f => f.name));
  if (!ex.has(base+ext)) return base+ext;
  let v=1; while(ex.has(`${base} V.${v}${ext}`)) v++;
  return `${base} V.${v}${ext}`;
}
async function _cwUpload(blob, name, mime, folderId) {
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify({name,parents:[folderId]})],{type:'application/json'}));
  form.append('file', blob);
  const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
    { method:'POST', headers:{ Authorization:`Bearer ${_cwTok}` }, body:form });
  if (!r.ok) throw new Error('Upload failed: '+r.statusText);
  return r.json();
}

async function doSaveDrive() {
  const btn = document.getElementById('btnDrive');
  const domain  = document.getElementById('sharedDomain').value.trim();
  const team    = document.getElementById('sharedTeam').value;
  if (!domain && !team) { cToast('⚠️ กรุณาระบุ Domain หรือ ชื่อทีม ก่อนบันทึก'); return; }
  const baseName = [team, domain].filter(Boolean).join(' - ') || 'HumanSoft_Report';

  btn.classList.add('loading');
  btn.textContent = '⏳ กำลังดำเนินการ…';
  try {
    cToast('🔐 กำลังเข้าสู่ระบบ Drive…');
    await _cwToken();

    cToast('📁 กำลังสร้างโฟลเดอร์…');
    const fId = await _cwFindOrMakeFolder(baseName);

    cToast('📊 กำลังสร้าง XLSX…');
    const xlsxBlob = await buildXlsxBlob();
    const xlsxName = await _cwNextName(baseName, '.xlsx', fId);

    cToast('📄 กำลังสร้าง PDF…');
    // frame-1 อาจ display:none ถ้าอยู่หน้า 2/3 — ต้องทำให้ render ได้ก่อน (visibility:hidden = มองไม่เห็นแต่ render ได้)
    const f1 = document.getElementById('frame-1');
    const f1WasHidden = !f1.classList.contains('active');
    if (f1WasHidden) {
      f1.style.display    = 'block';
      f1.style.visibility = 'hidden';
      f1.style.pointerEvents = 'none';
      await new Promise(r => setTimeout(r, 80)); // รอ browser layout pass
    }
    let pdfBlob;
    try {
      pdfBlob = await f1.contentWindow.makePDFBlob();
    } finally {
      if (f1WasHidden) {
        f1.style.display    = '';
        f1.style.visibility = '';
        f1.style.pointerEvents = '';
      }
    }
    const pdfName  = await _cwNextName(baseName, '.pdf',  fId);

    cToast('⬆️ กำลังอัพโหลด…');
    await _cwUpload(xlsxBlob, xlsxName, 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', fId);
    await _cwUpload(pdfBlob,  pdfName,  'application/pdf', fId);

    const folderUrl = `https://drive.google.com/drive/folders/${fId}`;
    cToast(`✅ บันทึกสำเร็จ!\n📊 ${xlsxName}\n📄 ${pdfName}\n📁 ${baseName}`);
    setTimeout(() => window.open(folderUrl, '_blank'), 2500);

  } catch(e) {
    cToast('❌ เกิดข้อผิดพลาด: ' + e.message);
    console.error(e);
  } finally {
    btn.classList.remove('loading');
    btn.textContent = '☁️ บันทึก Drive';
  }
}
